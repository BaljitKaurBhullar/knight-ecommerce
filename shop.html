            <div class="cart-wrapper">
                <div class="cart" id="cart-button">
                    🛒 (<span id="cart-count">0</span>)
                </div>

                <div class="cart-dropdown" id="cart-dropdown">
                    <h3>Your Cart</h3>
                    <div id="cart-items-list">
                        <p>Your cart is empty.</p>
                    </div>
                    <div class="cart-total" id="cart-total">
                        <span>Total:</span>
                        <span id="total-amount">₹0</span>
                    </div>
                    <a href="checkout.html" class="checkout-btn">Go to Checkout</a>
                </div>
            </div>
        </div>
    </header>


    <main class="shop-container">
        <h1 class="shop-title">New Arrivals</h1>

        <div class="product-grid" id="product-grid">
            <!-- Products will be dynamically inserted here -->
        </div>

        <h1 class="shop-title" style="margin-top: 60px;">Clothing</h1>

        <div class="product-grid" id="clothing-grid">
            <!-- Clothing items will be dynamically inserted here -->
        </div>

        <h1 class="shop-title" style="margin-top: 60px;">Electronics</h1>

        <div class="product-grid" id="electronics-grid">
            <!--Electronics will be dynamically inserted here-->
        </div>

        <h1 class="shop-title" style="margin-top: 60px;">Sports and Outdoors</h1>

        <div class="product-grid" id="sports-grid">
            <!--Sports items will be dynamically inserted here-->
        </div>
    </main>

        <div class="footer-content">
            <a href="index.html" class="logo">
                <img src="images/knight.webp" alt="Logo">
                <span>KNIGHT</span>

        <div class="footer-bottom">
            <p>&copy; 2026 Knight E-Commerce. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // 1. Create an empty Array to hold our items
        let cartItems = [];

        // 2. Find our HTML elements
        const cartBtn = document.getElementById('cart-button');
        const cartDropdown = document.getElementById('cart-dropdown');
        const cartItemsList = document.getElementById('cart-items-list');
        const cartCount = document.getElementById('cart-count');

        // 3. Toggle the dropdown when the cart icon is clicked
        cartBtn.addEventListener('click', function () {
            cartDropdown.classList.toggle('active');
        });

        // 4. Use event delegation for "Add to Cart" buttons
        document.addEventListener('click', function (event) {
            if (event.target.classList.contains('buy-btn')) {
                const button = event.target;
                const itemName = button.getAttribute('data-name');
                const itemPrice = parseFloat(button.getAttribute('data-price')) || 0;

                // Add this new item to our array
                cartItems.push({ name: itemName, price: itemPrice });

                // Call a function to redraw the cart visual
                updateCartUI();
            }
        });

        // 5. This function updates the HTML inside the dropdown
        function updateCartUI() {
            // Update the number next to the cart
            cartCount.innerText = cartItems.length;
            const cartTotal = document.getElementById('cart-total');
            const totalAmount = document.getElementById('total-amount');

            if (cartItems.length === 0) {
                cartItemsList.innerHTML = '<p>Your cart is empty.</p>';
                cartTotal.style.display = 'none';
                return;
            }

            cartTotal.style.display = 'flex';

            // Build the HTML for all items first
            let itemsHTML = '';
            let total = 0;
            cartItems.forEach(function (item, index) {
                total += item.price;
                itemsHTML += `
                    <div class="cart-item">
                        <div class="item-info">
                            <span>${item.name}</span>
                            <strong>₹${item.price.toLocaleString('en-IN')}</strong>
                        </div>
                        <button class="remove-btn" onclick="removeItem(${index})">×</button>
                    </div>
                `;
            });

            // Update the list and total
            cartItemsList.innerHTML = itemsHTML;
            totalAmount.innerText = `₹${total.toLocaleString('en-IN')}`;
        }

        // 6. Function to remove items
        window.removeItem = function (index) {
            cartItems.splice(index, 1);
            updateCartUI();
        };

        // Generate product cards dynamically
        function renderProducts(targetId, productList) {
            const grid = document.getElementById(targetId);

            const productsHTML = productList.map((product) => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.title}" class="product-image">
                    <h3>${product.title}</h3>
                    <p class="price">${product.price}</p>
                    <button class="buy-btn" data-name="${product.title}" data-price="${product.price.replace(/[₹,]/g, '')}">Add to Cart</button>
                    <a href="checkout.html" class="buy-now-btn" target="_blank">Buy Now</a>
                </div>
            `).join('');

            grid.innerHTML = productsHTML;
        }
