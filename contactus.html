<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Knight</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="knight-header">
        <div class="header-wrapper">
            <a href="index.html" class="logo">
                <img src="images/knight.webp" alt="Logo">
                <span>KNIGHT</span>
            </a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
            </nav>
        </div>
    </header>

    <main class="page-container">

        <div class="contact-section">
            <div class="left-section">
                <h1 class="page-title">Contact Us</h1>
                <p>Feel free to use the form or drop us an E-mail. Old-Fashioned phone calls work too.</p>
                <div>
                    <h3>📞 +91 83609-86235</h3>
                    <h3>✉️ samarpratapsinghbhullar@gmail.com</h3>
                </div>
            </div>
            <div class="right-section">
                <form id="mock-checkout-form">
                    <div class="form-section">
                        <div class="input-row">
                            <div>
                                <label>Name</label>
                                <input type="text" placeholder="First Name" required>
                            </div>
                            <div>
                                <label>_</label>
                                <input type="text" placeholder="Last Name" required>
                            </div>
                        </div>

                        <label>E-mail Address</label>
                        <input type="email" placeholder="abc123@example.com" required>

                        <label>Phone Number</label>
                        <input type="text" placeholder="+91 XXXXX XXXXX" maxlength="15" required>

                        <label>Message</label>
                        <input type="message" placeholder="Type your Message..." required>
                    </div>
                    <button type="submit" class="hero-btn checkout-submit">Submit</button>
                </form>

            </div>
        </div>
    </main>

    <footer class="knight-footer">
        <div class="footer-content">
            <a href="index.html" class="logo">
                <img src="images/knight.webp" alt="logo">
                <span>KNIGHT</span>
            </a>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Knight E-Commerce. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const checkoutForm = document.getElementById('mock-checkout-form');

        // We tell the form to listen for the "submit" action
        checkoutForm.addEventListener('submit', function (event) {
            // This line stops the page from reloading (which is the default HTML behavior)
            event.preventDefault();

            // Create a fake loading experience
            const submitBtn = document.querySelector('.checkout-submit');
            submitBtn.innerText = "Processing...";
            submitBtn.style.backgroundColor = "#555";

            // Wait 2 seconds, then show the success message!
            setTimeout(() => {
                alert("🎉 SUCCESS! \n\nThank you for the Feedback");

                // Redirect them back to the home page
                window.location.href = "index.html";
            }, 2000);
        });
    </script>
</body>


</html>
